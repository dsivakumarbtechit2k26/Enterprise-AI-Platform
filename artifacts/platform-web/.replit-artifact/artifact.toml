kind = "web"
previewPath = "/"
title = "Enterprise Platform"
version = "1.0.0"
id = "artifacts/platform-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22597

[services.development]
run = "pnpm --filter @workspace/platform-web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/platform-web", "run", "build" ]
publicDir = "artifacts/platform-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22597"
BASE_PATH = "/"
